name: Daily Ad Crawl

on:
  workflow_dispatch:  # 수동 실행 버튼만

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 playwright

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run crawlers (current month)
        run: python crawl.py

      - name: Commit updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracker.db
          git diff --staged --quiet || git commit -m "chore: daily crawl $(date +'%Y-%m-%d')"
          git push
